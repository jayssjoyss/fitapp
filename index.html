<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0c1520">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitApp">
<title>FitApp</title>

<style>
:root{--bg:#0c1520;--gold:#c9a84c;--text:#f0ede8;--muted:#7a8fa8;--faint:rgba(255,255,255,0.06);--border:rgba(255,255,255,0.1);--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
input,button,select,textarea{font-family:inherit;cursor:pointer;}
button:active{opacity:.7;}
.scr{display:none;min-height:100vh;flex-direction:column;}
.scr.on{display:flex;}
.pscr{background:radial-gradient(ellipse at 30% 20%,#1a3050,var(--bg) 60%);align-items:center;justify-content:center;padding:32px 20px;}
.pgrid{display:flex;gap:14px;width:100%;}
.pcard{flex:1;padding:24px 12px;border-radius:20px;border:none;color:var(--text);display:flex;flex-direction:column;align-items:center;gap:8px;}
.ahdr{background:linear-gradient(135deg,#182840,var(--bg));padding:14px 18px 0;border-bottom:1px solid var(--border);flex-shrink:0;}
.atop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.nav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.ntab{flex-shrink:0;padding:9px 12px;border-radius:12px 12px 0 0;border:none;font-size:11px;font-weight:600;background:transparent;color:var(--muted);}
.ntab.on{background:var(--text);color:var(--bg);}
.abody{flex:1;padding:16px 18px 80px;overflow-y:auto;}
.bk{background:var(--faint);border:1px solid var(--border);border-radius:10px;padding:6px 12px;color:var(--text);font-size:12px;}
.card{background:var(--faint);border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px;}
.clbl{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.inp{background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;width:100%;}
.inp:focus{border-color:var(--gold);}
.inpsm{background:rgba(255,255,255,0.08);border:1px solid var(--border);border-radius:10px;padding:9px;color:var(--text);font-size:15px;text-align:center;outline:none;width:100%;}
.inpsm:focus{border-color:var(--gold);}
.bigbtn{width:100%;padding:15px;border-radius:var(--r);border:none;font-size:15px;font-weight:800;color:var(--bg);margin-top:10px;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:32px;}
.wrow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;margin-bottom:14px;}
.wrow::-webkit-scrollbar{display:none;}
.wbtn{min-width:42px;flex-shrink:0;padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:2px;}
.wbtn small{font-size:9px;opacity:.6;}
.srow2{display:flex;gap:10px;margin-bottom:14px;}
.sbtn2{flex:1;padding:11px 8px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--faint);color:var(--muted);font-size:12px;font-weight:700;text-align:center;}
.excard2{background:var(--faint);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);}
.lgrow{display:grid;grid-template-columns:26px 1fr 1fr;gap:8px;align-items:center;margin-bottom:8px;}
.lgsn{font-size:11px;color:var(--muted);text-align:center;}
/* POIDS */
.went{background:var(--faint);border-radius:12px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
.went-top{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;}
.went-acts{display:flex;border-top:1px solid var(--border);}
.wact{flex:1;padding:9px;border:none;background:transparent;font-size:12px;font-weight:600;}
/* CATALOGUE avec schema */
.cattabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:8px;margin-bottom:10px;}
.cattabs::-webkit-scrollbar{display:none;}
.ctab{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:600;white-space:nowrap;}
.ctab.on{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold);}
.catcard{background:var(--faint);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;}
.cat-thumb{width:54px;height:54px;flex-shrink:0;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.cat-thumb svg{width:50px;height:50px;}
/* DETAIL EXERCICE */
.ex-detail-schema{width:100%;height:180px;background:rgba(255,255,255,0.03);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;border:1px solid var(--border);}
.ex-detail-schema svg{width:100%;height:100%;}
/* SEANCES LIBRES */
.exo-chk{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--faint);border-radius:10px;margin-bottom:6px;border:1px solid var(--border);}
.exo-chk.sel{border-color:var(--gold);background:rgba(201,168,76,0.1);}
.chkbox{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;}
.exo-chk.sel .chkbox{background:var(--gold);border-color:var(--gold);}
.sl-card{background:var(--faint);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px;overflow:hidden;}
.sl-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;}
.sl-acts{display:flex;border-top:1px solid var(--border);}
.slact{flex:1;padding:9px;border:none;background:transparent;font-size:12px;font-weight:600;}
/* TIMER */
.t-card{background:var(--faint);border-radius:var(--r);border:1px solid var(--border);margin-bottom:14px;overflow:hidden;}
.t-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.t-disp{text-align:center;padding:18px 16px 14px;}
.t-ph{font-size:11px;letter-spacing:4px;text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.t-cnt{font-size:64px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums;}
.t-rd{font-size:12px;color:var(--muted);margin-top:8px;}
.t-al{font-size:20px;font-weight:800;margin-top:4px;min-height:24px;}
.t-exo-now{font-size:13px;font-weight:700;margin-top:6px;min-height:18px;}
.t-exo-next{font-size:11px;color:var(--muted);margin-top:2px;min-height:14px;}
.t-bar{height:5px;background:rgba(255,255,255,0.1);margin:0 16px;border-radius:3px;}
.t-fill{height:100%;border-radius:3px;transition:width .1s linear;}
.t-btns{display:flex;gap:10px;padding:12px 16px;}
.t-go{flex:2;padding:12px;border-radius:var(--r);border:none;font-size:14px;font-weight:800;background:var(--gold);color:var(--bg);}
.t-rst{flex:1;padding:12px;border-radius:var(--r);border:none;font-size:12px;font-weight:700;background:rgba(255,255,255,0.1);color:var(--text);}
.t-sets{display:flex;gap:8px;padding:0 16px 12px;}
.tset{flex:1;}
.tsetl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.tsetr{display:flex;align-items:center;gap:6px;}
.tsetb{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--faint);color:var(--text);font-size:16px;}
.tsetv{font-size:14px;font-weight:700;min-width:26px;text-align:center;}
.preset{padding:10px 14px;border-radius:12px;background:var(--faint);border:1px solid var(--border);margin-bottom:8px;}
/* MODAL */
.modal-bg{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center;}
.modal-bg.on{display:flex;}
.modal{background:#182840;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
.avG{display:flex;flex-wrap:wrap;gap:8px;}
.avB{width:44px;height:44px;border-radius:12px;border:2px solid var(--border);background:var(--faint);font-size:22px;}
.avB.sel{border-color:var(--gold);background:rgba(201,168,76,.15);}
.coG{display:flex;flex-wrap:wrap;gap:10px;}
.coB{width:34px;height:34px;border-radius:10px;border:3px solid transparent;}
.coB.sel{border-color:#fff;}
.badge{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-right:6px;}
.exo-edit-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--faint);border-radius:10px;margin-bottom:6px;border:1px solid var(--border);}
</style>
</head>
<body>

<div id="scr-profiles" class="scr on pscr">
  <div style="font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;margin-bottom:14px">Bienvenue</div>
  <div style="font-size:26px;font-weight:800;text-align:center;line-height:1.2;margin-bottom:6px">Qui s'entraine<br>aujourd'hui ?</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:36px">Selectionnez votre profil</div>
  <div class="pgrid" id="pgrid"></div>
</div>

<div id="scr-edit" class="scr">
  <div style="background:var(--bg);padding:22px 20px;flex:1">
    <button class="bk" style="margin-bottom:20px" onclick="go('profiles')">← Retour</button>
    <div style="font-size:22px;font-weight:800;margin-bottom:22px">Modifier le profil</div>
    <div class="card" style="margin-bottom:12px"><div class="clbl">Nom</div><input id="ename" class="inp" style="font-size:15px;text-align:left;padding:12px 14px"></div>
    <div class="card" style="margin-bottom:12px"><div class="clbl">Avatar</div><div class="avG" id="eav"></div></div>
    <div class="card" style="margin-bottom:12px"><div class="clbl">Couleur</div><div class="coG" id="eco"></div></div>
    <button id="esave" class="bigbtn" onclick="saveProf()">Sauvegarder</button>
  </div>
</div>

<div id="scr-app" class="scr">
  <div class="ahdr">
    <div class="atop">
      <button class="bk" onclick="go('profiles')">← Profils</button>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="hav" style="font-size:24px"></span>
        <div><div style="font-size:14px;font-weight:700" id="hnm"></div><div style="font-size:10px;color:var(--muted)" id="hsu"></div></div>
      </div>
    </div>
    <div class="nav">
      <button class="ntab on" onclick="tab('prog')">Programme</button>
      <button class="ntab" onclick="tab('libre')">Seances</button>
      <button class="ntab" onclick="tab('suivi')">Suivi</button>
      <button class="ntab" onclick="tab('cat')">Exercices</button>
      <button class="ntab" onclick="tab('timer')">Timer</button>
    </div>
  </div>
  <div class="abody" id="abody"></div>
</div>

<!-- MODAL EDIT POIDS -->
<div class="modal-bg" id="modal-poids">
  <div class="modal">
    <div style="font-size:16px;font-weight:800;margin-bottom:16px">Modifier la mesure</div>
    <div style="margin-bottom:10px"><label style="font-size:11px;color:var(--muted)">Poids (kg)</label><input type="number" id="modal-kg" class="inp" style="margin-top:6px;font-size:16px"></div>
    <div style="margin-bottom:10px"><label style="font-size:11px;color:var(--muted)">Date</label><input type="date" id="modal-date" class="inp" style="margin-top:6px"></div>
    <div style="margin-bottom:16px"><label style="font-size:11px;color:var(--muted)">Note</label><input type="text" id="modal-note" class="inp" style="margin-top:6px"></div>
    <div style="display:flex;gap:10px">
      <button onclick="closeModalPoids()" style="flex:1;padding:12px;border-radius:var(--r);border:none;background:rgba(255,255,255,0.1);color:var(--text);font-size:13px;font-weight:700">Annuler</button>
      <button style="flex:2;padding:12px;border-radius:var(--r);border:none;background:var(--gold);color:var(--bg);font-size:14px;font-weight:800" onclick="savePoids()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- MODAL NOM SEANCE -->
<div class="modal-bg" id="modal-seance">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:800">Nom de la seance</div>
      <button onclick="closeModalSeance()" style="background:rgba(255,255,255,0.08);border:none;border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px">✕</button>
    </div>
    <input type="text" id="sl-name" class="inp" placeholder="Ex: Full body du lundi" style="margin-bottom:16px">
    <button class="bigbtn" style="margin-top:0" onclick="confirmSaveSeance()">Valider</button>
  </div>
</div>

<!-- MODAL EDIT EXERCICES PROGRAMME -->
<div class="modal-bg" id="modal-exos">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:800">Modifier les exercices</div>
      <button onclick="closeModalExos()" style="background:rgba(255,255,255,0.08);border:none;border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px">✕</button>
    </div>
    <div id="modal-exos-list"></div>
    <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
      <div style="font-size:11px;color:var(--gold);margin-bottom:8px;font-weight:700">Ajouter un exercice</div>
      <input type="text" id="exo-search-add" class="inp" placeholder="Rechercher..." style="margin-bottom:8px" oninput="rExoSearchAdd()">
      <div id="exo-search-results" style="max-height:180px;overflow-y:auto"></div>
    </div>
    <button class="bigbtn" id="modal-exos-save" style="margin-top:12px" onclick="saveExosEdit()">Sauvegarder</button>
  </div>
</div>

<!-- MODAL CREER EXERCICE PERSO -->
<div class="modal-bg" id="modal-new-exo">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:800">Nouvel exercice</div>
      <button onclick="closeModalNewExo()" style="background:rgba(255,255,255,0.08);border:none;border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px">✕</button>
    </div>
    <div style="margin-bottom:10px"><label style="font-size:11px;color:var(--muted)">Nom</label><input type="text" id="ne-name" class="inp" style="margin-top:6px" placeholder="Ex: Squat bulgare"></div>
    <div style="margin-bottom:10px"><label style="font-size:11px;color:var(--muted)">Categorie</label>
      <select id="ne-cat" class="inp" style="margin-top:6px">
        <option>Jambes & Fessiers</option><option>Pectoraux & Epaules</option><option>Dos & Biceps</option><option>Triceps & Bras</option><option>Abdominaux & Core</option><option>Cardio & Mobilite</option>
      </select>
    </div>
    <div style="margin-bottom:10px"><label style="font-size:11px;color:var(--muted)">Equipement</label><input type="text" id="ne-tag" class="inp" style="margin-top:6px" placeholder="Ex: Halteres, Poids corps..."></div>
    <div style="margin-bottom:16px"><label style="font-size:11px;color:var(--muted)">Description (optionnel)</label><textarea id="ne-desc" class="inp" style="margin-top:6px;height:70px;resize:none" placeholder="Comment faire l exercice..."></textarea></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;background:rgba(201,168,76,0.08);border-radius:10px;padding:10px 12px;border:1px solid rgba(201,168,76,0.2)">
      <input type="checkbox" id="ne-add-seance" style="width:18px;height:18px;accent-color:var(--gold)">
      <label for="ne-add-seance" style="font-size:13px;cursor:pointer">Ajouter directement a une seance</label>
    </div>
    <button class="bigbtn" id="ne-save-btn" onclick="saveNewExo()">Creer l exercice</button>
  </div>
</div>

<!-- MODAL CHOISIR SEANCE POUR AJOUT -->
<div class="modal-bg" id="modal-add-to-seance">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:16px;font-weight:800">Ajouter a une seance</div>
      <button onclick="closeModalAddSeance()" style="background:rgba(255,255,255,0.08);border:none;border-radius:8px;padding:6px 10px;color:var(--text);font-size:12px">✕</button>
    </div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px" id="add-seance-exo-name"></div>
    <div id="add-seance-list"></div>
    <button onclick="createNewSeanceFromExo()" style="width:100%;padding:12px;border-radius:var(--r);border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:13px;font-weight:700;margin-top:8px">+ Creer une nouvelle seance</button>
  </div>
</div>

<script>
var AVS=["💪","🏃","🔥","⚡","🦁","🐯","🚀","⭐","🏆","👊","🎯","💥"];
var COS=["#c9a84c","#64B5F6","#CE93D8","#81C784","#FF8A65","#F06292","#4DB6AC","#FFD54F","#FF7043","#AB47BC"];
var DEFP=[
  {id:"p1",name:"Moi",avatar:"💪",color:"#c9a84c",gender:"M",age:36,height:192,weight:140},
  {id:"p2",name:"Famille",avatar:"🔥",color:"#F06292",gender:"F",age:35,height:170,weight:88}
];

// ── SVG SCHEMAS ──────────────────────────────────────────────────
// Stick figure SVGs for each exercise type
var SVGS={
  squat:'<svg viewBox="0 0 100 100"><circle cx="50" cy="12" r="8" fill="#c9a84c"/><line x1="50" y1="20" x2="50" y2="50" stroke="#c9a84c" stroke-width="3"/><line x1="50" y1="28" x2="35" y2="42" stroke="#c9a84c" stroke-width="2.5"/><line x1="50" y1="28" x2="65" y2="42" stroke="#c9a84c" stroke-width="2.5"/><line x1="50" y1="50" x2="35" y2="75" stroke="#c9a84c" stroke-width="3"/><line x1="50" y1="50" x2="65" y2="75" stroke="#c9a84c" stroke-width="3"/><line x1="35" y1="75" x2="30" y2="90" stroke="#c9a84c" stroke-width="2.5"/><line x1="65" y1="75" x2="70" y2="90" stroke="#c9a84c" stroke-width="2.5"/></svg>',
  squat_bas:'<svg viewBox="0 0 100 100"><circle cx="50" cy="12" r="8" fill="#c9a84c"/><line x1="50" y1="20" x2="50" y2="45" stroke="#c9a84c" stroke-width="3"/><line x1="50" y1="30" x2="33" y2="44" stroke="#c9a84c" stroke-width="2.5"/><line x1="50" y1="30" x2="67" y2="44" stroke="#c9a84c" stroke-width="2.5"/><line x1="50" y1="45" x2="28" y2="68" stroke="#c9a84c" stroke-width="3"/><line x1="50" y1="45" x2="72" y2="68" stroke="#c9a84c" stroke-width="3"/><line x1="28" y1="68" x2="20" y2="88" stroke="#c9a84c" stroke-width="2.5"/><line x1="72" y1="68" x2="80" y2="88" stroke="#c9a84c" stroke-width="2.5"/><rect x="10" y="88" width="80" height="4" rx="2" fill="#c9a84c" opacity="0.3"/></svg>',

function getSVG(id,name){
  var n=(name||"").toLowerCase();var i=(id||"").toLowerCase();
  if(i.indexOf("squat")>=0&&(i.indexOf("sumo")>=0||i.indexOf("goblet")>=0||i.indexOf("barre")>=0||i.indexOf("halter")>=0))return SVGS.squat_bas;
  if(i.indexOf("squat")>=0)return SVGS.squat;
  if(i.indexOf("fente")>=0||i.indexOf("lunge")>=0)return SVGS.fente;
  if(i.indexOf("hip")>=0||i.indexOf("releve_bassin")>=0)return SVGS.hip_thrust;
  if(i.indexOf("sdt")>=0||i.indexOf("souleve")>=0)return SVGS.sdt;
  if(i.indexOf("developpe")>=0||i.indexOf("press")>=0)return SVGS.developpe;
  if(i.indexOf("rowing")>=0||i.indexOf("tirage")>=0||i.indexOf("trx")>=0)return SVGS.rowing;
  if(i.indexOf("curl")>=0)return SVGS.curl;
  if(i.indexOf("ext_coude")>=0||i.indexOf("triceps")>=0||i.indexOf("skull")>=0||i.indexOf("kickback")>=0||i.indexOf("dips")>=0)return SVGS.ext_triceps;
  if(i.indexOf("planche_lat")>=0)return SVGS.planche_lat;
  if(i.indexOf("planche")>=0||i.indexOf("gainage")>=0)return SVGS.planche;
  if(i.indexOf("crunch")>=0||i.indexOf("bicycle")>=0||i.indexOf("chandelle")>=0||i.indexOf("ciseau")>=0||i.indexOf("russian")>=0)return SVGS.crunch;
  if(i.indexOf("sit_up")>=0||i.indexOf("sit up")>=0)return SVGS.sit_up;
  if(i.indexOf("pompe")>=0||i.indexOf("push")>=0||i.indexOf("superman")>=0&&i.indexOf("pompe")>=0)return SVGS.pompes;
  if(i.indexOf("superman")>=0)return SVGS.superman;
  if(i.indexOf("elev_lat")>=0||i.indexOf("elev_front")>=0||i.indexOf("elev_coude")>=0)return SVGS.elev_lat;
  if(i.indexOf("thruster")>=0||i.indexOf("wall_ball")>=0)return SVGS.wall_ball;
  if(i.indexOf("abduction")>=0||i.indexOf("ext_hanche")>=0)return SVGS.abduction;
  if(i.indexOf("burpee")>=0||i.indexOf("jumping")>=0||i.indexOf("mountain")>=0)return SVGS.burpees;
  if(i.indexOf("marche")>=0||i.indexOf("course")>=0||i.indexOf("rameur")>=0)return SVGS.marche;
  return SVGS.default_fig;
}

function drawChart(ws,col){var cv=document.getElementById("wc");if(!cv)return;var ctx=cv.getContext("2d"),W=cv.width,H=cv.height;var pts=ws.slice(0,12).reverse();var vals=pts.map(function(p){return p.kg;}),mn=Math.min.apply(null,vals)-1,mx=Math.max.apply(null,vals)+1;var pl=38,pr=12,pt=14,pb=28;ctx.clearRect(0,0,W,H);ctx.fillStyle="#0d1e30";ctx.beginPath();ctx.rect(0,0,W,H);ctx.fill();ctx.strokeStyle="rgba(255,255,255,0.06)";ctx.lineWidth=1;for(var i=0;i<5;i++){var y=pt+(H-pt-pb)*i/4;ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(W-pr,y);ctx.stroke();}ctx.fillStyle="rgba(255,255,255,0.35)";ctx.font="9px sans-serif";ctx.textAlign="right";for(var i=0;i<3;i++){var y2=pt+(H-pt-pb)*i/2,v=(mx-(mx-mn)*i/2).toFixed(1);ctx.fillText(v,pl-3,y2+3);}ctx.textAlign="center";if(pts.length>1){var stp=Math.max(1,Math.floor(pts.length/5));pts.forEach(function(p,i){if(i%stp===0){var x=pl+(W-pl-pr)*i/(pts.length-1);ctx.fillStyle="rgba(255,255,255,0.35)";ctx.fillText(p.date.slice(0,5),x,H-6);}});}var grd=ctx.createLinearGradient(0,pt,0,H-pb);grd.addColorStop(0,col+"44");grd.addColorStop(1,col+"00");ctx.beginPath();pts.forEach(function(p,i){var x=pl+(W-pl-pr)*i/(pts.length-1),y=pt+(H-pt-pb)*(1-(p.kg-mn)/(mx-mn));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.lineTo(pl+(W-pl-pr)*(pts.length-1)/(pts.length-1),H-pb);ctx.lineTo(pl,H-pb);ctx.closePath();ctx.fillStyle=grd;ctx.fill();ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineJoin="round";ctx.lineCap="round";pts.forEach(function(p,i){var x=pl+(W-pl-pr)*i/(pts.length-1),y=pt+(H-pt-pb)*(1-(p.kg-mn)/(mx-mn));if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.stroke();pts.forEach(function(p,i){var x=pl+(W-pl-pr)*i/(pts.length-1),y=pt+(H-pt-pb)*(1-(p.kg-mn)/(mx-mn));ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();ctx.strokeStyle="#0d1e30";ctx.lineWidth=2;ctx.stroke();});}

    h+='</div></div>';

  c.innerHTML=h;
}
function selCatK(k){catK=k;catDet=null;render();}
function openDet(id){catDet=id;render();}
function closeDet(){catDet=null;render();}
function rCatDetail(c){
  var ex=findEx(catDet);if(!ex){catDet=null;render();return;}
  var svg=getSVG(ex.id,ex.name);
  var pc=AP.color;
  var h='<button onclick="closeDet()" style="background:rgba(255,255,255,0.08);border:none;border-radius:10px;padding:8px 14px;color:var(--text);font-size:12px;margin-bottom:16px">← Retour</button>';
  h+='<div style="background:var(--faint);border-radius:16px;padding:20px;border:1px solid var(--border)">';
  h+='<div style="font-size:22px;font-weight:800;color:var(--gold);margin-bottom:10px">'+ex.name+'</div>';
  h+='<span class="badge" style="background:rgba(255,255,255,.08);color:#aabbcc">'+ex.tag+'</span>';
  // BIG SCHEMA
  h+='<div style="width:100%;height:200px;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid var(--border);margin:14px 0;display:flex;align-items:center;justify-content:center;overflow:hidden">';
  h+='<svg viewBox="0 0 100 100" style="width:180px;height:180px">'+svg.replace(/^<svg[^>]*>/,"").replace(/<\/svg>$/,"")+'</svg>';
  h+='</div>';
  if(ex.desc)h+='<div style="font-size:13px;color:#aabbcc;line-height:1.7;margin-bottom:14px">'+ex.desc+'</div>';
  if(AP){var kg=getCh(ex.id,AP.gender,pW);if(kg>0)h+='<div style="background:rgba(201,168,76,0.1);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--gold);border:1px solid rgba(201,168,76,0.2);margin-bottom:14px">Charge suggeree semaine '+(pW+1)+': <strong>'+kg+' kg</strong></div>';}
  h+='<button onclick="openAddToSeance(\''+ex.id+'\')" style="width:100%;padding:13px;border-radius:var(--r);border:none;background:'+pc+';color:var(--bg);font-size:14px;font-weight:800">+ Ajouter a une seance</button>';
  h+='</div>';
  c.innerHTML=h;
}

// ADD EXERCISE TO SESSION from catalogue
function openAddToSeance(exoId){
  pendingAddExoId=exoId;
  var ex=findEx(exoId);
  document.getElementById("add-seance-exo-name").textContent="Ajouter: "+(ex?ex.name:exoId);
  var sl=ld(AP.id+"_sl");
  var h="";
  if(!sl.length)h='<div class="empty" style="padding:16px">Aucune seance. Cree-en une ci-dessous.</div>';
  else sl.forEach(function(s,i){
    h+='<div onclick="addExoToExistingSeance('+i+')" style="padding:12px 14px;background:var(--faint);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center">';
    h+='<div><div style="font-size:13px;font-weight:700">'+s.name+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">'+s.exos.length+' exercices</div></div>';
    h+='<div style="font-size:20px;color:'+AP.color+'">+</div></div>';
  });
  document.getElementById("add-seance-list").innerHTML=h;
  document.getElementById("modal-add-to-seance").classList.add("on");
}
function closeModalAddSeance(){document.getElementById("modal-add-to-seance").classList.remove("on");pendingAddExoId=null;}
function addExoToExistingSeance(idx){
  if(!pendingAddExoId)return;
  var sl=ld(AP.id+"_sl");
  var ex=findEx(pendingAddExoId);
  if(!ex)return;
  var alreadyIn=sl[idx].exos.find(function(e){return e.id===pendingAddExoId;});
  if(!alreadyIn)sl[idx].exos.push({id:pendingAddExoId,name:ex.name,tag:ex.tag});
  sd(AP.id+"_sl",sl);
  closeModalAddSeance();
  alert(ex.name+" ajoute a "+sl[idx].name+" !");
}
function createNewSeanceFromExo(){
  if(!pendingAddExoId)return;
  closeModalAddSeance();
  libSel=[pendingAddExoId];libSearch="";libEditIdx=-1;libView="create";
  tab("libre");
}

// NEW EXERCISE
function openModalNewExo(){document.getElementById("ne-name").value="";document.getElementById("ne-tag").value="";document.getElementById("ne-desc").value="";document.getElementById("ne-add-seance").checked=false;var btn=document.getElementById("ne-save-btn");btn.style.background=AP.color;btn.removeAttribute("data-edit-id");btn.textContent="Creer l exercice";document.getElementById("modal-new-exo").classList.add("on");}
function closeModalNewExo(){document.getElementById("modal-new-exo").classList.remove("on");}
function saveNewExo(){
  var name=document.getElementById("ne-name").value.trim();if(!name)return;
  var tag=document.getElementById("ne-tag").value.trim()||"Poids corps";
  var desc=document.getElementById("ne-desc").value.trim();
  var addToSeance=document.getElementById("ne-add-seance").checked;
  var btn=document.getElementById("ne-save-btn");
  var editId=btn.getAttribute("data-edit-id");
  var customs=getCustomExos();
  if(editId){
    customs=customs.map(function(e){return e.id===editId?{id:editId,name:name,tag:tag,desc:desc,custom:true}:e;});
    saveCustomExos(customs);btn.removeAttribute("data-edit-id");btn.textContent="Creer l exercice";
    closeModalNewExo();catK="Mes exercices";catDet=null;render();
  } else {
    var id="custom_"+Date.now();
    var newEx={id:id,name:name,tag:tag,desc:desc,custom:true};
    customs.push(newEx);saveCustomExos(customs);
    closeModalNewExo();
    if(addToSeance){pendingAddExoId=id;openAddToSeance(id);}
    else{catK="Mes exercices";catDet=null;render();}
  }
}

// TIMER
function buildTimer(pc,withExos){
  var isW=tPh==="work",col=isW?"#64B5F6":(pc||"var(--gold)"),total=isW?tW:tR,pct=tC/total*100;
  var exoNow=withExos&&tExos.length>0?tExos[tExoIdx%tExos.length]:"";
  var exoNext=withExos&&tExos.length>1?tExos[(tExoIdx+1)%tExos.length]:"";
  var h='<div class="t-card"><div class="t-hdr"><div><div style="font-size:12px;font-weight:700;color:var(--gold)">Timer</div><div style="font-size:10px;color:var(--muted);margin-top:2px">3 bips = 3 sec avant fin | 2 bips = repos | 1 long = travail</div></div>';
  h+='<button onclick="togSon()" style="padding:5px 9px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.08);color:var(--text);font-size:10px">'+(tSon?"Son ON":"Son OFF")+'</button></div>';
  h+='<div class="t-disp"><div class="t-ph" id="tph" style="color:'+col+'">'+(tRun?(isW?"TRAVAIL":"REPOS"):"PRET")+'</div>';
  h+='<div class="t-cnt" id="tcnt" style="color:'+col+'">'+tC+'</div>';
  h+='<div class="t-rd" id="trd">Tour '+tRd+' / '+tN+'</div>';
  h+='<div class="t-al" id="tal" style="color:'+col+'"></div>';
  if(withExos&&exoNow)h+='<div class="t-exo-now" id="texo-now">'+exoNow+'</div>';
  if(withExos&&exoNext)h+='<div class="t-exo-next" id="texo-next">Suivant: '+exoNext+'</div>';
  h+='</div><div class="t-bar"><div class="t-fill" id="tfill" style="width:'+pct+'%;background:'+col+'"></div></div>';
  h+='<div class="t-btns"><button class="t-go" onclick="togT()">'+(tRun?"Pause":"Demarrer")+'</button><button class="t-rst" onclick="rstT()">Reset</button></div>';
  h+='<div class="t-sets"><div class="tset"><div class="tsetl">Travail</div><div class="tsetr"><button class="tsetb" onclick="adjT(0,-5)">-</button><span class="tsetv">'+tW+'s</span><button class="tsetb" onclick="adjT(0,5)">+</button></div></div>';
  h+='<div class="tset"><div class="tsetl">Repos</div><div class="tsetr"><button class="tsetb" onclick="adjT(1,-5)">-</button><span class="tsetv">'+tR+'s</span><button class="tsetb" onclick="adjT(1,5)">+</button></div></div>';
  h+='<div class="tset"><div class="tsetl">Tours</div><div class="tsetr"><button class="tsetb" onclick="adjT(2,-1)">-</button><span class="tsetv">'+tN+'</span><button class="tsetb" onclick="adjT(2,1)">+</button></div></div></div></div>';
  return h;
}
function rTimer(c){
  var h=buildTimer(AP?AP.color:null,false);
  h+='<div class="clbl" style="margin-top:14px">Presets</div>';
  [["Tabata 40/10","40s / 10s / 6 tours",40,10,6],["Tabata 20/10","20s / 10s / 8 tours",20,10,8],["Debutant","40s / 20s / 6 tours",40,20,6],["Intermediaire","30s / 15s / 10 tours",30,15,10],["Force","45s / 15s / 6 tours",45,15,6]].forEach(function(p){
    h+='<div class="preset" onclick="applyT('+p[2]+','+p[3]+','+p[4]+')"><div style="font-size:13px;font-weight:700">'+p[0]+'</div><div style="font-size:11px;color:var(--muted);margin-top:2px">'+p[1]+'</div></div>';
  });
  c.innerHTML=h;
}
function togSon(){tSon=!tSon;render();}
function adjT(k,v){if(k===0)tW=Math.max(5,tW+v);if(k===1)tR=Math.max(5,tR+v);if(k===2)tN=Math.max(1,tN+v);if(!tRun){tC=tW;tPh="work";tRd=1;}render();}
function applyT(w,r,n){tW=w;tR=r;tN=n;rstT();}
function rstT(){clearInterval(tInt);tRun=false;tPh="work";tC=tW;tRd=1;tExoIdx=0;render();}
function togT(){gAC();if(tRun){clearInterval(tInt);tRun=false;render();}else{tRun=true;tInt=setInterval(doTick,1000);render();}}
function doTick(){
  tC--;
  if(tC===3)sTick();if(tC===2)sTick();if(tC===1)sTick();
  var al=document.getElementById("tal");if(al&&tC<=3&&tC>0)al.textContent=tC;
  if(tC<=0){if(al)al.textContent="";if(tPh==="work"){tPh="rest";tC=tR;sRest();}else{tRd++;tExoIdx++;if(tRd>tN){clearInterval(tInt);tRun=false;sDone();render();return;}tPh="work";tC=tW;sWork();}}
  updT();
}
function updT(){var isW=tPh==="work",col=isW?"#64B5F6":(AP?AP.color:"var(--gold)"),total=isW?tW:tR;var ph=document.getElementById("tph"),ct=document.getElementById("tcnt"),rd=document.getElementById("trd"),fi=document.getElementById("tfill"),al=document.getElementById("tal"),en=document.getElementById("texo-now"),en2=document.getElementById("texo-next");if(ph){ph.textContent=isW?"TRAVAIL":"REPOS";ph.style.color=col;}if(ct){ct.textContent=tC;ct.style.color=col;}if(rd)rd.textContent="Tour "+tRd+" / "+tN;if(fi){fi.style.width=(tC/total*100)+"%";fi.style.background=col;}if(al&&tC>3)al.textContent="";if(en&&tExos.length>0)en.textContent=tExos[tExoIdx%tExos.length];if(en2&&tExos.length>1)en2.textContent="Suivant: "+tExos[(tExoIdx+1)%tExos.length];}

rP();

// Inline Service Worker via blob
if("serviceWorker" in navigator){
  var swCode = [
    'var CACHE="fitapp-v2";',
    'var FILES=["/"];',
    'self.addEventListener("install",function(e){',
    '  e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(FILES);}));',
    '  self.skipWaiting();',
    '});',
    'self.addEventListener("activate",function(e){',
    '  e.waitUntil(caches.keys().then(function(keys){',
    '    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));',
    '  }));',
    '  self.clients.claim();',
    '});',
    'self.addEventListener("fetch",function(e){',
    '  e.respondWith(caches.match(e.request).then(function(cached){',
    '    return cached||fetch(e.request).then(function(resp){',
    '      if(!resp||resp.status!==200||resp.type!=="basic")return resp;',
    '      var clone=resp.clone();',
    '      caches.open(CACHE).then(function(c){c.put(e.request,clone);});',
    '      return resp;',
    '    }).catch(function(){return cached;});',
    '  }));',
    '});'
  ].join('\n');
  var blob = new Blob([swCode], {type:'application/javascript'});
  var swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(function(){});
}

function doCatSearch(v){catSearch=v;render();}
function doLibSearch(v){libSearch=v;var b=document.getElementById('abody');if(b&&curTab==='libre')rLibre(b);}
function delCustomExo(id){
  var customs=getCustomExos();
  customs=customs.filter(function(e){return e.id!==id;});
  saveCustomExos(customs);
  catDet=null;
  if(catK==="Mes exercices"&&!customs.length)catK=Object.keys(EXO_CATS)[0];
  render();
}
function editCustomExo(id){
  var ex=getCustomExos().find(function(e){return e.id===id;});
  if(!ex)return;
  document.getElementById("ne-name").value=ex.name;
  document.getElementById("ne-tag").value=ex.tag;
  document.getElementById("ne-desc").value=ex.desc||"";
  document.getElementById("ne-add-seance").checked=false;
  document.getElementById("ne-save-btn").style.background=AP.color;
  document.getElementById("ne-save-btn").setAttribute("data-edit-id",id);
  document.getElementById("ne-save-btn").textContent="Mettre a jour";
  document.getElementById("modal-new-exo").classList.add("on");
}
